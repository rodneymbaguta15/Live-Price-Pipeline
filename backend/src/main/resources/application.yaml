spring:
  application:
    name: live-price-pipeline

  # ── H2 in-memory database ────────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:pricedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # ── Kafka ────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false

    consumer:
      group-id: price-consumer-group
      auto-offset-reset: earliest

    streams:
      application-id: live-price-streams
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde
        default.value.serde: org.springframework.kafka.support.serializer.JsonSerde
        spring.json.trusted.packages: "*"
        commit.interval.ms: 1000

kafka:
  topics:
    raw-ticks: raw-price-ticks
    ohlcv-candles: ohlcv-candles
    price-alerts: price-alerts

producer:
  interval-ms: 2000
  tickers: BTC,ETH,SOL

alerts:
  threshold-percent: 0.3

logging:
  level:
    com.live_price_pipeline: INFO
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.hibernate: WARN